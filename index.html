<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Locker Information - Shibuya</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        h1 { margin-top: 20px; margin-bottom: 15px; }
        p { line-height: 1.6; }
        ul { margin: 10px 0; padding-left: 30px; }
        #map { height: 700px; width: 100%; margin: 15px 0; border: 1px solid #ddd; border-radius: 4px; }
        .filter { padding: 12px; background: #f0f0f0; display: flex; flex-direction: column; margin: 15px 0; border-radius: 4px; }
        .filter label { margin-bottom: 8px; }
        .ad { text-align: center; padding: 15px; background: #ddd; margin: 15px 0; border-radius: 4px; }
        .top-bar { text-align: right; padding: 12px 15px; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        .top-bar label { margin-right: 8px; font-weight: 500; }
        .top-bar select { padding: 6px 10px; font-size: 14px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; }
        .popup-content { max-width: 280px; }
        .popup-content h3 { margin: 0 0 10px 0; }
        .popup-content p { margin: 5px 0; font-size: 13px; }
        .icon { font-size: 20px; margin-right: 5px; }
        .green { color: green; }
        .red { color: red; }
        .blue { color: blue; }
        footer { clear: both; font-size: 13px; }
        footer p { margin: 5px 0; }
        @media (max-width: 768px) {
            #map { height: 500px; }
            .container { padding: 0 10px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <label for="lang-select"><strong>Language:</strong> </label>
        <select id="lang-select" onchange="changeLanguage()">
            <option value="en" selected>English</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <div class="container">
        <h1></h1>
        <p></p>
        <p></p>
        <ul></ul>
        <p></p>
        <div class="filter"></div>
        <div id="map"></div>
        <div class="ad"></div>
    </div>

    <footer style="text-align: center; padding: 20px; background: #f0f0f0; margin-top: 20px;">
        <p><span id="footer-company"></span> <span id="footer-ceo"></span> | <span id="footer-business"></span></p>
        <p><span id="footer-contact"></span></p>
        <p id="footer-copyright"></p>
    </footer>

    <script>
        // Language translations
        const translations = {
            ja: {
                title: "コインロッカー情報 - 渋谷 (インバウンド向け多言語対応サンプル)",
                intro: "都市OS (Urban OS) について: 当社では、観光都市の「生活インフラ情報」を横断的に提供するプラットフォームを開発しています。Google Mapsでは扱わない、人手で横断的に集めた詳細情報（充電エリア、トイレ情報、駐輪場、駐車場など）を、地図ベースでわかりやすくお届け。インバウンド観光客向けに多言語対応し、快適な都市体験をサポートします。",
                services: "提供サービス例:",
                servicesList: [
                    "コインロッカー情報: サイズ、料金、段差なし/屋根あり/スーツケース対応などの詳細。",
                    "充電エリア: スマートフォン充電スポットの場所と利用条件。",
                    "トイレ情報: 清潔度、アクセシビリティ、多機能トイレの有無。",
                    "駐輪場/駐車場: 料金、セキュリティ、利用可能時間。"
                ],
                diff: "これらの情報は、人手による横断調査で収集。差別化ポイントは、Google Mapsを超える「実用的詳細」と「使いやすいUI」です。",
                filterTitle: "フィルタ",
                noStep: "段差なし (No Step)",
                roof: "屋根あり (With Roof)",
                suitcase: "スーツケース対応 (Suitcase OK)",
                stationInside: "駅構内不要 (No Station Inside)",
                apply: "フィルタ適用 (Apply Filter)",
                ad: "広告スペース (Ad Space - Google AdSense)",
                copyright: "© 2026 Harbors LLC. All rights reserved.",
                footerCompany: "<strong>会社情報:</strong> 合同会社 [会社名]",
                footerCeo: "代表: [あなたの名前]",
                footerBusiness: "事業: 都市OSプラットフォームの開発・運営",
                footerContact: "お問い合わせ: [メールアドレス] | ウェブサイト: [URL]"
            },
            en: {
                title: "Coin Locker Information - Shibuya (Multilingual Sample for Inbound Tourism)",
                intro: "About Urban OS: We build a platform that provides comprehensive urban infrastructure information for tourist cities. Using on‑the‑ground surveys, we publish practical details—charging spots, toilets, bike parking, parking lots, and more—that go beyond standard map services, presented via a user‑friendly map interface.",
                services: "Example Services:",
                servicesList: [
                    "Coin Locker Info: Details such as size, price, step‑free access, roof availability, and suitcase compatibility.",
                    "Charging Areas: Locations and conditions for smartphone charging spots.",
                    "Toilet Information: Cleanliness, accessibility, and availability of multi‑functional toilets.",
                    "Bike Parking/Parking Lots: Fees, security, and available hours."
                ],
                diff: "This information is collected through on‑the‑ground surveys. Our edge is delivering highly practical, granular details and a user‑friendly UI that complement standard map services.",
                filterTitle: "Filters",
                noStep: "Step‑free access",
                roof: "Covered (with roof)",
                suitcase: "Suitcase‑friendly",
                stationInside: "No station entry required",
                apply: "Apply Filter",
                ad: "Ad Space (Google AdSense)",
                copyright: "© 2026 Harbors LLC. All rights reserved.",
                footerCompany: "<strong>Company Info:</strong> Harbors LLC",
                footerCeo: "Representative / CEO: [Your Name]",
                footerBusiness: "Business: Development & Operation of the Urban OS platform",
                footerContact: "Contact: [Email Address] | Website: [URL]"
            }
        };

        // Locker data
        const lockers = [
            {
                name: "Shibuya Station Locker A",
                lat: 35.6580,
                lng: 139.7016,
                size: "Large",
                price: "¥500/day",
                noStep: true,
                roof: true,
                suitcase: true,
                stationInside: false,
                distance: "徒歩2分 (2 min walk)",
                details: "段差なし、スーツケースOK。屋根あり。"
            },
            {
                name: "Shibuya Station Locker B",
                lat: 35.6590,
                lng: 139.7020,
                size: "Medium",
                price: "¥300/day",
                noStep: false,
                roof: false,
                suitcase: false,
                stationInside: true,
                distance: "徒歩5分 (5 min walk)",
                details: "段差あり、駅構内進入必要。"
            },
            {
                name: "Nearby Hotel Locker",
                lat: 35.6575,
                lng: 139.7000,
                size: "Small",
                price: "¥200/day",
                noStep: true,
                roof: true,
                suitcase: true,
                stationInside: false,
                distance: "徒歩1分 (1 min walk)",
                details: "段差なし、スーツケースOK。敷地外。"
            },
            {
                name: "Scramble Crossing Locker",
                lat: 35.6595,
                lng: 139.7005,
                size: "Large",
                price: "¥600/day",
                noStep: true,
                roof: false,
                suitcase: true,
                stationInside: false,
                distance: "徒歩3分 (3 min walk)",
                details: "段差なし、スーツケースOK。屋根なし。"
            },
            {
                name: "Station East Exit Locker",
                lat: 35.6585,
                lng: 139.7025,
                size: "Medium",
                price: "¥400/day",
                noStep: false,
                roof: true,
                suitcase: false,
                stationInside: true,
                distance: "徒歩4分 (4 min walk)",
                details: "段差あり、屋根あり。駅構内。"
            },
            {
                name: "Park Side Locker",
                lat: 35.6570,
                lng: 139.6995,
                size: "Small",
                price: "¥250/day",
                noStep: true,
                roof: true,
                suitcase: true,
                stationInside: false,
                distance: "徒歩2分 (2 min walk)",
                details: "段差なし、屋根あり、スーツケースOK。"
            },
            {
                name: "Underground Locker",
                lat: 35.6592,
                lng: 139.7010,
                size: "Large",
                price: "¥700/day",
                noStep: false,
                roof: false,
                suitcase: false,
                stationInside: true,
                distance: "徒歩6分 (6 min walk)",
                details: "段差あり、屋根なし。地下進入必要。"
            },
            {
                name: "Shopping Mall Locker",
                lat: 35.6565,
                lng: 139.6980,
                size: "Medium",
                price: "¥350/day",
                noStep: true,
                roof: false,
                suitcase: true,
                stationInside: false,
                distance: "徒歩3分 (3 min walk)",
                details: "段差なし、スーツケースOK。屋根なし。"
            },
            {
                name: "Hotel Annex Locker",
                lat: 35.6582,
                lng: 139.6990,
                size: "Small",
                price: "¥300/day",
                noStep: true,
                roof: true,
                suitcase: false,
                stationInside: false,
                distance: "徒歩1分 (1 min walk)",
                details: "段差なし、屋根あり。スーツケース不可。"
            },
            {
                name: "Station West Locker",
                lat: 35.6598,
                lng: 139.7030,
                size: "Large",
                price: "¥550/day",
                noStep: false,
                roof: true,
                suitcase: true,
                stationInside: true,
                distance: "徒歩5分 (5 min walk)",
                details: "段差あり、屋根あり、スーツケースOK。駅構内。"
            }
        ];

        // Global variables
        let currentLang = 'en';
        let t = translations[currentLang];
        let map;
        let markers = [];

        // Initialize map
        function initMap() {
            map = L.map('map').setView([35.6580, 139.7016], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);
            addMarkers(lockers);
        }

        // Add markers to map
        function addMarkers(data) {
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];
            data.forEach(locker => {
                let iconHtml = '<i class="fas fa-archive" style="color: gray; font-size: 20px;"></i>';
                if (locker.noStep) iconHtml = '<i class="fas fa-check-circle" style="color: green; font-size: 20px;"></i>';
                if (locker.roof) iconHtml += '<i class="fas fa-umbrella" style="color: blue; font-size: 16px; margin-left: 5px;"></i>';
                if (locker.suitcase) iconHtml += '<i class="fas fa-suitcase" style="color: orange; font-size: 16px; margin-left: 5px;"></i>';

                const customIcon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-marker',
                    iconSize: [30, 30],
                    iconAnchor: [15, 30]
                });

                const marker = L.marker([locker.lat, locker.lng], { icon: customIcon }).addTo(map);
                
                // Generate popup content based on current language
                let popupContent;
                if (currentLang === 'ja') {
                    popupContent = `
                        <div class="popup-content">
                            <h3>${locker.name}</h3>
                            <p>サイズ: ${locker.size} | 料金: ${locker.price}</p>
                            <p>移動距離: ${locker.distance}</p>
                            <p>
                                <i class="fas fa-walking ${locker.noStep ? 'green' : 'red'}"></i> 段差なし: ${locker.noStep ? 'はい' : 'いいえ'}<br>
                                <i class="fas fa-umbrella ${locker.roof ? 'blue' : 'red'}"></i> 屋根あり: ${locker.roof ? 'はい' : 'いいえ'}<br>
                                <i class="fas fa-suitcase ${locker.suitcase ? 'green' : 'red'}"></i> スーツケース: ${locker.suitcase ? 'はい' : 'いいえ'}<br>
                                <i class="fas fa-building ${!locker.stationInside ? 'green' : 'red'}"></i> 駅構内不要: ${!locker.stationInside ? 'はい' : 'いいえ'}
                            </p>
                            <p>${locker.details}</p>
                        </div>
                    `;
                } else {
                    popupContent = `
                        <div class="popup-content">
                            <h3>${locker.name}</h3>
                            <p>Size: ${locker.size} | Price: ${locker.price}</p>
                            <p>Distance: ${locker.distance}</p>
                            <p>
                                <i class="fas fa-walking ${locker.noStep ? 'green' : 'red'}"></i> Step‑free access: ${locker.noStep ? 'Yes' : 'No'}<br>
                                <i class="fas fa-umbrella ${locker.roof ? 'blue' : 'red'}"></i> Covered (roof): ${locker.roof ? 'Yes' : 'No'}<br>
                                <i class="fas fa-suitcase ${locker.suitcase ? 'green' : 'red'}"></i> Suitcase‑friendly: ${locker.suitcase ? 'Yes' : 'No'}<br>
                                <i class="fas fa-building ${!locker.stationInside ? 'green' : 'red'}"></i> Inside station: ${locker.stationInside ? 'Yes' : 'No'}
                            </p>
                            <p>${locker.details}</p>
                        </div>
                    `;
                }
                
                marker.bindPopup(popupContent);
                markers.push(marker);
            });
        }

        // Apply filter
        function applyFilter() {
            const noStep = document.getElementById('no-step').checked;
            const roof = document.getElementById('roof').checked;
            const suitcase = document.getElementById('suitcase').checked;
            const stationInside = document.getElementById('station-inside').checked;

            const filtered = lockers.filter(locker => {
                return (!noStep || locker.noStep) &&
                       (!roof || locker.roof) &&
                       (!suitcase || locker.suitcase) &&
                       (!stationInside || !locker.stationInside);
            });
            addMarkers(filtered);
        }

        // Change language
        function changeLanguage() {
            currentLang = document.getElementById('lang-select').value;
            t = translations[currentLang];
            updateLanguage();
        }

        // Update page content
        function updateLanguage() {
            document.title = t.title;
            document.querySelector('h1').textContent = t.title;
            const ps = document.querySelectorAll('p');
            ps[0].innerHTML = `<strong>${t.intro.split(':')[0]}:</strong>${t.intro.split(':')[1]}`;
            ps[1].innerHTML = `<strong>${t.services}</strong>`;
            const ul = document.querySelector('ul');
            ul.innerHTML = t.servicesList.map(item => {
                const parts = item.split(':');
                return `<li><strong>${parts[0]}:</strong>${parts.slice(1).join(':')}</li>`;
            }).join('');
            ps[2].textContent = t.diff;
            document.querySelector('.filter').innerHTML = `
                <label><input type="checkbox" id="no-step" checked onchange="applyFilter()">${t.noStep}</label>
                <label><input type="checkbox" id="roof" checked onchange="applyFilter()">${t.roof}</label>
                <label><input type="checkbox" id="suitcase" checked onchange="applyFilter()">${t.suitcase}</label>
                <label><input type="checkbox" id="station-inside" checked onchange="applyFilter()">${t.stationInside}</label>
            `;
            document.querySelector('.ad').textContent = t.ad;
            document.querySelector('footer p:last-child').textContent = t.copyright;
            document.getElementById('lang-select').value = currentLang;
            
            // Update footer
            document.getElementById('footer-company').innerHTML = t.footerCompany;
            document.getElementById('footer-ceo').textContent = t.footerCeo;
            document.getElementById('footer-business').textContent = t.footerBusiness;
            document.getElementById('footer-contact').textContent = t.footerContact;
            document.getElementById('footer-copyright').textContent = t.copyright;
            
            if (map) map.invalidateSize();
            // Redraw markers with new language
            applyFilter();
        }

        // Initialize on page load
        window.addEventListener('load', function() {
            initMap();
            updateLanguage();
        });
    </script>
</body>
</html>
